 name: Pipeline CI/CD

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: flake8 producer/ etl/ --max-line-length=120 --ignore=E501

  validate-and-test:
    name: Validate Data & Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate synthetic events
        run: python producer/event_producer.py --mode file --output data/raw_events.jsonl --n 100
      - name: Run ETL pipeline
        run: python etl/pipeline.py --input data/raw_events.jsonl --db data/pipeline.duckdb
      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=etl --cov=producer --cov-report=term-missing

  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: validate-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate package structure
        run: |
          python -c "from producer.event_producer import generate_event; print('Producer OK')"
          python -c "from etl.pipeline import validate_event, detect_anomaly; print('ETL OK')"
      - name: Print build summary
        run: echo "Build successful — pipeline is ready for deployment."
